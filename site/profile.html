<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>My Profile | Bishop Martin Parent Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;600;700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: "class",
  theme: { extend: {
    colors: { "outline":"#8e706c","surface-container-highest":"#e3e2e0","primary-container":"#800000","surface-container-high":"#e9e8e6","error-container":"#ffdad6","on-background":"#1a1c1b","surface-container-lowest":"#ffffff","surface-container-low":"#f4f3f1","on-surface":"#1a1c1b","on-secondary":"#ffffff","error":"#ba1a1a","primary":"#570000","on-surface-variant":"#5a413d","on-error":"#ffffff","surface-bright":"#faf9f7","secondary":"#735c00","surface":"#faf9f7","surface-container":"#efeeec","background":"#faf9f7","surface-variant":"#e3e2e0","outline-variant":"#e2bfb9","secondary-container":"#fed65b","on-secondary-container":"#745c00","on-primary-container":"#ff8371","on-primary":"#ffffff","on-error-container":"#93000a" },
    borderRadius: { "none":"0","DEFAULT":"0.125rem","lg":"0.25rem","xl":"0.5rem","full":"0.75rem" },
    spacing: { "none":"0","base":"4px","xs":"8px","sm":"16px","md":"24px","lg":"40px","xl":"64px","gutter":"24px" },
    fontFamily: { "headline-lg":["Libre Caslon Text","serif"],"headline-md":["Libre Caslon Text","serif"],"headline-sm":["Libre Caslon Text","serif"],"body-md":["Work Sans","sans-serif"],"body-sm":["Work Sans","sans-serif"],"label-lg":["Work Sans","sans-serif"],"label-md":["Work Sans","sans-serif"] },
    fontSize: { "headline-lg":["32px",{"lineHeight":"40px","fontWeight":"600"}],"headline-md":["24px",{"lineHeight":"32px","fontWeight":"600"}],"headline-sm":["20px",{"lineHeight":"28px","fontWeight":"600"}],"body-md":["16px",{"lineHeight":"24px","fontWeight":"400"}],"body-sm":["14px",{"lineHeight":"20px","fontWeight":"400"}],"label-lg":["14px",{"lineHeight":"20px","letterSpacing":"0.05em","fontWeight":"600"}],"label-md":["12px",{"lineHeight":"16px","fontWeight":"500"}] }
  }}
}
</script>
<style>.material-symbols-outlined{font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 24;}</style>
</head>
<body class="bg-background font-body-md text-on-surface">
<div class="flex min-h-screen">

  <!-- Sidebar — detects role to show correct nav -->
  <aside class="hidden md:flex h-screen w-80 bg-surface border-r border-outline-variant/20 flex-col p-md fixed left-0 top-0 bottom-0 z-40">
    <div class="flex items-center gap-sm mb-lg">
      <div class="w-10 h-10 bg-primary flex items-center justify-center rounded flex-shrink-0">
        <span class="material-symbols-outlined text-on-primary text-[20px]" style="font-variation-settings:'FILL' 1;">account_balance</span>
      </div>
      <div>
        <h1 class="font-headline-sm text-headline-sm text-primary leading-tight">Bishop Martin</h1>
        <p id="portal-label" class="font-label-md text-label-md text-on-surface-variant">Portal</p>
      </div>
    </div>
    <nav id="sidebar-nav" class="flex flex-col gap-xs flex-grow"></nav>
    <div class="pt-md border-t border-outline-variant/20 mt-auto">
      <div class="flex items-center gap-sm px-sm py-sm">
        <span class="material-symbols-outlined text-on-surface-variant text-[28px]" style="font-variation-settings:'FILL' 1;">account_circle</span>
        <div class="flex-grow min-w-0">
          <p id="sidebar-user-name" class="font-label-lg text-label-lg text-on-surface truncate">User</p>
          <p id="sidebar-user-email" class="font-label-md text-label-md text-on-surface-variant truncate"></p>
        </div>
        <button onclick="logout()" class="p-xs hover:bg-surface-container-high rounded-full text-on-surface-variant flex-shrink-0"><span class="material-symbols-outlined text-[20px]">logout</span></button>
      </div>
      <p class="font-label-md text-label-md text-on-surface-variant px-sm opacity-50 pb-xs">v1.0.4</p>
    </div>
  </aside>

  <main class="flex-grow md:ml-80 flex flex-col min-h-screen">
    <header class="flex items-center justify-between px-sm w-full h-16 z-30 bg-surface border-b border-outline-variant/20 sticky top-0 md:h-[72px]">
      <div class="flex items-center gap-sm">
        <button onclick="document.getElementById('mobile-drawer').classList.remove('hidden')" class="md:hidden p-base cursor-pointer"><span class="material-symbols-outlined text-primary">menu</span></button>
        <span class="font-headline-sm text-headline-sm font-semibold text-primary">Bishop Martin Parent Portal</span>
      </div>
      <button class="w-10 h-10 flex items-center justify-center rounded-full bg-primary-container text-on-primary-container">
        <span class="material-symbols-outlined text-[28px]" style="font-variation-settings:'FILL' 1;">account_circle</span>
      </button>
    </header>

    <div class="p-md md:p-lg flex-grow w-full max-w-[900px] mx-auto">
      <section class="mb-lg">
        <h2 class="font-headline-lg text-headline-lg text-primary mb-xs">My Profile</h2>
        <p class="font-body-md text-body-md text-on-surface-variant">View your account details and upload identity verification documents.</p>
      </section>

      <div id="profile-content" class="space-y-md">
        <div class="p-xl text-center font-body-md text-on-surface-variant">Loading profile...</div>
      </div>
    </div>

    <nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-base py-sm bg-surface border-t border-outline-variant/20">
      <a id="nav-home" href="/parent.html" class="flex flex-col items-center text-on-surface-variant"><span class="material-symbols-outlined">grid_view</span><span class="font-label-md text-label-md">Home</span></a>
      <a id="nav-requests" href="/requests.html" class="flex flex-col items-center text-on-surface-variant"><span class="material-symbols-outlined">description</span><span class="font-label-md text-label-md">Requests</span></a>
      <a href="/profile.html" class="flex flex-col items-center bg-primary-container text-on-primary-container rounded-full px-4 py-1"><span class="material-symbols-outlined" style="font-variation-settings:'FILL' 1;">person</span><span class="font-label-md text-label-md">Profile</span></a>
    </nav>
    <div class="h-20 md:hidden"></div>
  </main>
</div>

<div id="mobile-drawer" class="hidden fixed inset-0 bg-black/50 z-50 md:hidden" onclick="this.classList.add('hidden')">
  <aside class="w-80 h-full bg-surface p-md flex flex-col" onclick="event.stopPropagation()">
    <div class="flex items-center justify-between mb-lg">
      <div class="flex items-center gap-sm"><div class="w-10 h-10 bg-primary flex items-center justify-center rounded"><span class="material-symbols-outlined text-on-primary text-[20px]" style="font-variation-settings:'FILL' 1;">account_balance</span></div><h1 class="font-headline-sm text-headline-sm text-primary">Bishop Martin</h1></div>
      <button onclick="document.getElementById('mobile-drawer').classList.add('hidden')" class="p-base hover:bg-surface-container-high rounded-full"><span class="material-symbols-outlined">close</span></button>
    </div>
    <nav id="mobile-nav" class="flex flex-col gap-xs"></nav>
    <div class="mt-auto pt-md border-t border-outline-variant/20">
      <button onclick="logout()" class="flex items-center gap-sm px-sm py-sm w-full text-on-surface-variant hover:bg-surface-container-low rounded font-label-lg text-label-lg"><span class="material-symbols-outlined">logout</span> Sign Out</button>
    </div>
  </aside>
</div>

<script src="/js/api.js"></script>
<script>
  if (!getToken() || !getUser()) window.location.href = '/login.html';
  const u = getUser();
  populateSidebar();

  // Build nav based on role
  const isStaff = u?.type === 'staff' || u?.role === 'super_admin' || u?.role === 'admin' || u?.role === 'viewer';
  const isSuper = u?.role === 'super_admin';

  const navItems = isSuper
    ? [{ href:'/superadmin.html', icon:'grid_view', label:'Dashboard' }, { href:'/users.html', icon:'group', label:'Users' }]
    : isStaff
    ? [{ href:'/staff.html', icon:'grid_view', label:'Dashboard' }]
    : [{ href:'/parent.html', icon:'grid_view', label:'Home' }, { href:'/requests.html', icon:'description', label:'My Requests' }];

  document.getElementById('portal-label').textContent = isSuper ? 'Admin Portal' : isStaff ? 'Staff Portal' : 'Parent Portal';

  const navHtml = navItems.map(n => `<a href="${n.href}" class="flex items-center gap-sm px-sm py-[10px] text-on-surface-variant hover:bg-surface-container-low transition-colors rounded font-label-lg text-label-lg"><span class="material-symbols-outlined text-[22px]">${n.icon}</span>${n.label}</a>`).join('') +
    `<a href="/profile.html" class="flex items-center gap-sm px-sm py-[10px] bg-primary-container text-on-primary-container font-label-lg text-label-lg rounded"><span class="material-symbols-outlined text-[22px]" style="font-variation-settings:'FILL' 1;">person</span>My Profile</a>`;

  document.getElementById('sidebar-nav').innerHTML = navHtml;
  document.getElementById('mobile-nav').innerHTML = navHtml;

  async function loadProfile() {
    const container = document.getElementById('profile-content');
    try {
      let profile;
      if (!isStaff) {
        profile = await apiFetch('/parent/profile');
      } else {
        // Staff: show info from stored user
        profile = { full_name: u.full_name || u.email, email: u.email, phone: '—', verified: true, user_type: u.role };
      }

      const verifiedBadge = profile.verified
        ? '<span class="inline-flex items-center gap-xs px-sm py-xs rounded-full bg-secondary-container text-on-secondary-container font-label-lg text-label-lg text-xs"><span class="material-symbols-outlined text-[14px]">verified</span> Identity Verified</span>'
        : '<span class="inline-flex items-center gap-xs px-sm py-xs rounded-full bg-error-container text-on-error-container font-label-lg text-label-lg text-xs"><span class="material-symbols-outlined text-[14px]">warning</span> Pending Verification</span>';

      container.innerHTML = `
        <!-- Profile Header Card -->
        <div class="bg-surface-container-lowest border border-outline-variant/20 rounded overflow-hidden shadow-sm">
          <div class="h-24 bg-primary relative overflow-hidden">
            <div class="absolute inset-0 opacity-10 flex items-center justify-center">
              <span class="material-symbols-outlined text-white text-[200px]" style="font-variation-settings:'FILL' 1;">account_balance</span>
            </div>
          </div>
          <div class="px-lg pb-lg">
            <div class="w-20 h-20 rounded bg-primary flex items-center justify-center text-on-primary font-bold text-2xl -mt-10 border-4 border-surface-container-lowest">
              ${(profile.full_name || '?').split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase()}
            </div>
            <div class="mt-sm flex flex-col md:flex-row md:items-center md:justify-between gap-sm">
              <div>
                <h3 class="font-headline-md text-headline-md text-on-surface">${profile.full_name || '—'}</h3>
                <p class="font-body-md text-body-md text-on-surface-variant capitalize">${(profile.user_type || '').replace(/_/g,' ')}</p>
              </div>
              <div>${verifiedBadge}</div>
            </div>
          </div>
        </div>

        <!-- Account Details -->
        <div class="bg-surface-container-lowest border border-outline-variant/20 rounded p-md shadow-sm">
          <h3 class="font-headline-sm text-headline-sm text-on-surface mb-md">Account Details</h3>
          <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
            <div class="space-y-base">
              <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Full Name</p>
              <p class="font-body-md text-body-md text-on-surface">${profile.full_name || '—'}</p>
            </div>
            <div class="space-y-base">
              <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Email Address</p>
              <p class="font-body-md text-body-md text-on-surface">${profile.email || '—'}</p>
            </div>
            <div class="space-y-base">
              <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Phone</p>
              <p class="font-body-md text-body-md text-on-surface">${profile.phone || '—'}</p>
            </div>
            <div class="space-y-base">
              <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Account Type</p>
              <p class="font-body-md text-body-md text-on-surface capitalize">${(profile.user_type || '').replace(/_/g,' ')}</p>
            </div>
            <div class="space-y-base">
              <p class="font-label-md text-label-md text-on-surface-variant uppercase tracking-wider">Member Since</p>
              <p class="font-body-md text-body-md text-on-surface">${profile.created_at ? new Date(profile.created_at).toLocaleDateString('en-US',{month:'long',year:'numeric'}) : '—'}</p>
            </div>
          </div>
        </div>

        ${!isStaff ? `
        <!-- ID Verification Upload -->
        <div class="bg-surface-container-lowest border border-outline-variant/20 rounded p-md shadow-sm">
          <div class="flex items-start gap-md mb-md">
            <div class="w-10 h-10 rounded bg-${profile.verified ? 'secondary-container' : 'error-container'} flex items-center justify-center flex-shrink-0">
              <span class="material-symbols-outlined text-${profile.verified ? 'on-secondary-container' : 'on-error-container'}">id_card</span>
            </div>
            <div>
              <h3 class="font-headline-sm text-headline-sm text-on-surface">Identity Verification</h3>
              <p class="font-body-sm text-body-sm text-on-surface-variant mt-xs">
                ${profile.verified
                  ? 'Your identity has been verified by the Bishop Martin registrar.'
                  : 'Upload a government-issued ID or SSN card to verify your identity. This is required to process document requests.'}
              </p>
            </div>
          </div>
          ${!profile.verified ? `
          <form id="id-upload-form" enctype="multipart/form-data">
            <div id="id-upload-error" class="hidden p-sm bg-error-container text-on-error-container rounded font-body-sm text-body-sm mb-sm"></div>
            <div id="id-upload-success" class="hidden p-sm bg-secondary-container text-on-secondary-container rounded font-body-sm text-body-sm mb-sm">ID uploaded successfully! Pending staff review.</div>
            <div class="flex flex-col md:flex-row gap-md items-end">
              <div class="flex-grow space-y-base">
                <label class="font-label-lg text-label-lg text-on-surface-variant block">Select ID Document (JPG, PNG, PDF)</label>
                <input id="id-file" type="file" accept="image/*,.pdf" class="w-full font-body-sm text-on-surface file:mr-md file:py-sm file:px-md file:rounded file:border-0 file:bg-surface-container-high file:text-on-surface file:font-label-lg file:text-label-lg hover:file:bg-surface-container-highest cursor-pointer">
              </div>
              <button type="submit" id="id-upload-btn" class="flex-shrink-0 flex items-center gap-xs bg-primary text-on-primary px-md py-sm rounded font-label-lg text-label-lg hover:opacity-90 active:scale-95 transition-all">
                <span class="material-symbols-outlined text-[18px]">upload</span> Upload ID
              </button>
            </div>
          </form>` : `
          <div class="flex items-center gap-sm p-sm bg-secondary-container/30 rounded">
            <span class="material-symbols-outlined text-on-secondary-container">check_circle</span>
            <span class="font-body-sm text-body-sm text-on-secondary-container">Verification complete. No action needed.</span>
          </div>`}
        </div>

        <!-- Change Password -->
        <div class="bg-surface-container-lowest border border-outline-variant/20 rounded p-md shadow-sm">
          <h3 class="font-headline-sm text-headline-sm text-on-surface mb-md">Security</h3>
          <div id="pw-error" class="hidden p-sm bg-error-container text-on-error-container rounded font-body-sm text-body-sm mb-sm"></div>
          <div id="pw-success" class="hidden p-sm bg-secondary-container text-on-secondary-container rounded font-body-sm text-body-sm mb-sm">Password changed successfully!</div>
          <form id="pw-form" class="space-y-md">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-md">
              <div class="space-y-base">
                <label class="font-label-lg text-label-lg text-on-surface-variant block">New Password</label>
                <input id="new-pw" type="password" placeholder="Min. 6 characters" class="w-full px-md py-sm bg-surface border border-outline-variant rounded focus:border-primary outline-none font-body-md transition-all">
              </div>
              <div class="space-y-base">
                <label class="font-label-lg text-label-lg text-on-surface-variant block">Confirm New Password</label>
                <input id="confirm-pw" type="password" placeholder="Re-enter new password" class="w-full px-md py-sm bg-surface border border-outline-variant rounded focus:border-primary outline-none font-body-md transition-all">
              </div>
            </div>
            <button type="submit" class="flex items-center gap-xs bg-primary text-on-primary px-md py-sm rounded font-label-lg text-label-lg hover:opacity-90 active:scale-95 transition-all">
              <span class="material-symbols-outlined text-[18px]">lock_reset</span> Update Password
            </button>
          </form>
        </div>` : ''}

        <!-- Sign Out -->
        <div class="bg-surface-container-lowest border border-outline-variant/20 rounded p-md shadow-sm flex items-center justify-between">
          <div>
            <p class="font-label-lg text-label-lg text-on-surface">Sign Out</p>
            <p class="font-body-sm text-body-sm text-on-surface-variant">End your current session securely.</p>
          </div>
          <button onclick="logout()" class="flex items-center gap-xs border border-outline text-primary px-md py-sm rounded font-label-lg text-label-lg hover:bg-surface-container-low transition-all">
            <span class="material-symbols-outlined text-[18px]">logout</span> Sign Out
          </button>
        </div>`;

      // ID upload handler
      const idForm = document.getElementById('id-upload-form');
      if (idForm) {
        idForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const file = document.getElementById('id-file').files[0];
          const errEl = document.getElementById('id-upload-error');
          const successEl = document.getElementById('id-upload-success');
          const btn = document.getElementById('id-upload-btn');
          errEl.classList.add('hidden');
          if (!file) { errEl.textContent = 'Please select a file.'; errEl.classList.remove('hidden'); return; }
          btn.disabled = true; btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">hourglass_top</span> Uploading...';
          try {
            const fd = new FormData(); fd.append('ssn_image', file);
            const res = await fetch('/api/parent/upload-ssn-card', { method:'POST', headers:{ Authorization:`Bearer ${getToken()}` }, body:fd });
            const d = await res.json();
            if (!res.ok) throw new Error(d.message);
            successEl.classList.remove('hidden');
            idForm.style.display = 'none';
          } catch(err) {
            errEl.textContent = err.message; errEl.classList.remove('hidden');
            btn.disabled = false; btn.innerHTML = '<span class="material-symbols-outlined text-[18px]">upload</span> Upload ID';
          }
        });
      }

      // Password change handler
      const pwForm = document.getElementById('pw-form');
      if (pwForm) {
        pwForm.addEventListener('submit', async (e) => {
          e.preventDefault();
          const np = document.getElementById('new-pw').value;
          const cp = document.getElementById('confirm-pw').value;
          const errEl = document.getElementById('pw-error');
          const successEl = document.getElementById('pw-success');
          errEl.classList.add('hidden');
          if (np.length < 6) { errEl.textContent = 'Password must be at least 6 characters.'; errEl.classList.remove('hidden'); return; }
          if (np !== cp) { errEl.textContent = 'Passwords do not match.'; errEl.classList.remove('hidden'); return; }
          try {
            await apiFetch('/auth/change-profile-password', { method:'POST', body: JSON.stringify({ newPassword: np }) });
            successEl.classList.remove('hidden');
            document.getElementById('new-pw').value = '';
            document.getElementById('confirm-pw').value = '';
          } catch(err) {
            errEl.textContent = err.message; errEl.classList.remove('hidden');
          }
        });
      }

    } catch(err) {
      container.innerHTML = `<div class="p-xl text-center font-body-md text-error">${err.message}</div>`;
    }
  }

  loadProfile();
</script>
</body>
</html>
