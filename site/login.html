<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Sign In | Bishop Martin Parent Portal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Libre+Caslon+Text:wght@400;600;700&family=Work+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "outline": "#8e706c",
        "surface-container-highest": "#e3e2e0",
        "primary-container": "#800000",
        "surface-container-high": "#e9e8e6",
        "error-container": "#ffdad6",
        "on-background": "#1a1c1b",
        "surface-container-lowest": "#ffffff",
        "surface-container-low": "#f4f3f1",
        "on-surface": "#1a1c1b",
        "on-secondary": "#ffffff",
        "error": "#ba1a1a",
        "secondary-fixed": "#ffe088",
        "primary": "#570000",
        "on-surface-variant": "#5a413d",
        "on-error": "#ffffff",
        "surface-dim": "#dadad8",
        "surface-bright": "#faf9f7",
        "secondary": "#735c00",
        "surface": "#faf9f7",
        "surface-container": "#efeeec",
        "background": "#faf9f7",
        "surface-variant": "#e3e2e0",
        "outline-variant": "#e2bfb9",
        "secondary-container": "#fed65b",
        "on-secondary-container": "#745c00",
        "on-primary-container": "#ff8371",
        "on-primary": "#ffffff",
        "on-error-container": "#93000a",
        "inverse-surface": "#2f3130",
        "inverse-primary": "#ffb4a8",
        "tertiary": "#162839",
        "tertiary-container": "#2c3e50",
        "on-tertiary": "#ffffff",
        "on-tertiary-container": "#96a9be"
      },
      borderRadius: {
        "none": "0",
        "DEFAULT": "0.125rem",
        "lg": "0.25rem",
        "xl": "0.5rem",
        "full": "0.75rem"
      },
      spacing: {
        "none": "0",
        "base": "4px",
        "xs": "8px",
        "sm": "16px",
        "md": "24px",
        "lg": "40px",
        "xl": "64px",
        "gutter": "24px"
      },
      fontFamily: {
        "headline-lg": ["Libre Caslon Text", "serif"],
        "headline-md": ["Libre Caslon Text", "serif"],
        "headline-sm": ["Libre Caslon Text", "serif"],
        "display-lg": ["Libre Caslon Text", "serif"],
        "body-lg": ["Work Sans", "sans-serif"],
        "body-md": ["Work Sans", "sans-serif"],
        "body-sm": ["Work Sans", "sans-serif"],
        "label-lg": ["Work Sans", "sans-serif"],
        "label-md": ["Work Sans", "sans-serif"]
      },
      fontSize: {
        "display-lg": ["48px", {"lineHeight": "56px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
        "headline-lg": ["32px", {"lineHeight": "40px", "fontWeight": "600"}],
        "headline-md": ["24px", {"lineHeight": "32px", "fontWeight": "600"}],
        "headline-sm": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
        "body-lg": ["18px", {"lineHeight": "28px", "fontWeight": "400"}],
        "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
        "body-sm": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
        "label-lg": ["14px", {"lineHeight": "20px", "letterSpacing": "0.05em", "fontWeight": "600"}],
        "label-md": ["12px", {"lineHeight": "16px", "fontWeight": "500"}]
      }
    }
  }
}
</script>
<style>
  .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
</style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-md font-body-md text-on-surface">

<div class="w-full max-w-md">
  <!-- Card -->
  <div class="bg-surface-container-lowest border border-outline-variant/30 rounded-lg shadow-sm overflow-hidden">
    <!-- Top accent bar -->
    <div class="h-1.5 w-full bg-primary-container"></div>

    <div class="p-lg md:p-xl space-y-md">
      <!-- Logo / School Crest -->
      <div class="flex flex-col items-center text-center space-y-sm">
        <div class="w-16 h-16 bg-primary flex items-center justify-center rounded-lg">
          <span class="material-symbols-outlined text-on-primary text-[36px]" style="font-variation-settings:'FILL' 1;">account_balance</span>
        </div>
        <div>
          <h1 class="font-headline-md text-headline-md text-primary">Bishop Martin</h1>
          <p class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-wider">Parent &amp; Staff Portal</p>
        </div>
      </div>

      <!-- Divider -->
      <div class="border-t border-outline-variant/20"></div>

      <!-- Error alert -->
      <div id="error-alert" class="hidden flex gap-sm p-sm bg-error-container border border-error/20 rounded items-start">
        <span class="material-symbols-outlined text-error text-[18px] flex-shrink-0 mt-[2px]">error_outline</span>
        <p id="error-msg" class="font-body-sm text-body-sm text-on-error-container"></p>
      </div>

      <!-- Login Form -->
      <form id="login-form" class="space-y-md" autocomplete="off">
        <div class="space-y-base">
          <label class="block font-label-lg text-label-lg text-on-surface-variant" for="email">Email Address</label>
          <div class="relative flex items-center">
            <span class="material-symbols-outlined absolute left-sm text-on-surface-variant text-[18px]">mail</span>
            <input
              id="email"
              type="email"
              placeholder="yourname@bishopmartin.edu"
              class="w-full pl-xl pr-sm py-sm bg-surface border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none rounded font-body-md transition-all"
              autocomplete="email"
            >
          </div>
        </div>

        <div class="space-y-base">
          <div class="flex justify-between items-center">
            <label class="block font-label-lg text-label-lg text-on-surface-variant" for="password">Password</label>
            <a href="#" class="font-label-md text-label-md text-primary hover:underline">Forgot password?</a>
          </div>
          <div class="relative flex items-center">
            <span class="material-symbols-outlined absolute left-sm text-on-surface-variant text-[18px]">lock</span>
            <input
              id="password"
              type="password"
              placeholder="••••••••"
              class="w-full pl-xl pr-xl py-sm bg-surface border border-outline-variant focus:border-primary focus:ring-1 focus:ring-primary outline-none rounded font-body-md transition-all"
              autocomplete="current-password"
            >
            <button type="button" id="toggle-pw" class="absolute right-sm text-on-surface-variant hover:text-primary transition-colors">
              <span class="material-symbols-outlined text-[18px]">visibility</span>
            </button>
          </div>
        </div>

        <button
          type="submit"
          id="submit-btn"
          class="w-full bg-primary text-on-primary py-sm px-md font-label-lg text-label-lg rounded hover:opacity-90 active:scale-95 transition-all flex items-center justify-center gap-sm"
        >
          <span id="btn-text">Sign In</span>
          <span id="btn-icon" class="material-symbols-outlined text-[18px]">arrow_forward</span>
        </button>

        <!-- Divider -->
        <div class="flex items-center gap-sm">
          <div class="flex-grow h-px bg-outline-variant/30"></div>
          <span class="font-label-md text-label-md text-on-surface-variant">or</span>
          <div class="flex-grow h-px bg-outline-variant/30"></div>
        </div>

        <a href="/register.html" class="w-full border border-outline text-primary py-sm px-md font-label-lg text-label-lg rounded hover:bg-surface-container-low active:scale-95 transition-all flex items-center justify-center gap-sm">
          <span class="material-symbols-outlined text-[18px]">person_add</span>
          Register as Parent / Guardian
        </a>
      </form>

      <!-- Footer note -->
      <p class="text-center font-body-sm text-body-sm text-on-surface-variant">
        Access restricted to authorized personnel. <br>
        Contact <a href="mailto:admin@bishopmartin.edu" class="text-primary hover:underline">admin@bishopmartin.edu</a> for access issues.
      </p>
    </div>
  </div>

  <p class="text-center font-label-md text-label-md text-on-surface-variant mt-md opacity-50">
    Bishop Martin High School &copy; 2024 &middot; v1.0.4
  </p>
</div>

<script src="/js/api.js"></script>
<script>
  // Redirect if already logged in
  if (getToken() && getUser()) {
    const user = getUser();
    if (user.role === 'super_admin') window.location.href = '/superadmin.html';
    else if (user.user_type === 'parent' || user.user_type === 'past_student') window.location.href = '/parent.html';
    else window.location.href = '/staff.html';
  }

  // Toggle password visibility
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const icon = document.querySelector('#toggle-pw .material-symbols-outlined');
    if (pw.type === 'password') {
      pw.type = 'text';
      icon.textContent = 'visibility_off';
    } else {
      pw.type = 'password';
      icon.textContent = 'visibility';
    }
  });

  // Login form submit
  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submit-btn');
    const btnText = document.getElementById('btn-text');
    const btnIcon = document.getElementById('btn-icon');
    const errorAlert = document.getElementById('error-alert');
    const errorMsg = document.getElementById('error-msg');

    errorAlert.classList.add('hidden');
    btn.disabled = true;
    btnText.textContent = 'Signing in...';
    btnIcon.style.display = 'none';

    try {
      const data = await apiFetch('/auth/login', {
        method: 'POST',
        body: JSON.stringify({ email, password })
      });

      // Store token first
      setToken(data.token);

      // Build user object from login response
      const user = {
        id: data.id,
        email: email,
        role: data.role,
        type: data.type,
        full_name: data.full_name || null,
        user_type: data.type
      };

      // Try to fetch full profile for full_name
      try {
        if (data.role === 'super_admin' || data.type === 'staff') {
          const staffList = await apiFetch('/superadmin/staff');
          const me = Array.isArray(staffList) ? staffList.find(s => s.email === email) : null;
          if (me) user.full_name = me.full_name;
        }
      } catch (e) { /* profile fetch failed, continue with email as name */ }

      setUser(user);

      if (user.role === 'super_admin') {
        window.location.href = '/superadmin.html';
      } else if (user.type === 'parent' || user.type === 'past_student') {
        window.location.href = '/parent.html';
      } else {
        window.location.href = '/staff.html';
      }
    } catch (err) {
      errorMsg.textContent = err.message || 'Invalid email or password.';
      errorAlert.classList.remove('hidden');
      btn.disabled = false;
      btnText.textContent = 'Sign In';
      btnIcon.style.display = '';
    }
  });
</script>
</body>
</html>
